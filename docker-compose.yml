version: "3.8"

services:

  #################################################
  # MySQL
  #################################################

  db01:
    build:
      context: .
      dockerfile: Dockerfile.db

    container_name: vprofile-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-p${DB_PASS}"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - vprofile-network

  #################################################
  # Memcached
  #################################################

  mc01:
    build:
      context: .
      dockerfile: Dockerfile.mc

    container_name: vprofile-memcached

    restart: unless-stopped

    networks:
      - vprofile-network

  #################################################
  # RabbitMQ
  #################################################

  rmq01:
    build:
      context: .
      dockerfile: Dockerfile.rmq

    container_name: vprofile-rabbitmq

    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASS}

    healthcheck:
      test: ["CMD","rabbitmq-diagnostics","-q","ping"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - vprofile-network

  #################################################
  # Java Application
  #################################################

  vprofile-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: vprofile-app

    restart: unless-stopped

    depends_on:
      db01:
        condition: service_healthy
      rmq01:
        condition: service_healthy

    ports:
      - "8080:8080"

    networks:
      - vprofile-network

  #################################################
  # Second Application (Nginx)
  #################################################

  second-app:
    build:
      context: ./second-app

    container_name: second-app

    restart: unless-stopped

    ports:
      - "8081:80"

    networks:
      - vprofile-network

#################################################
# Volumes
#################################################

volumes:
  mysql-data:

#################################################
# Network
#################################################

networks:
  vprofile-network:
    driver: bridge