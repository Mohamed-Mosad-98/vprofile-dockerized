server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /second {
        return 301 /second/;
    }

    location /second/ {
        rewrite ^/second/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}